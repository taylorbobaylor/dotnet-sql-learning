apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-server
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sql-server.labels" . | nindent 4 }}
spec:
  # SQL Server with a single PVC cannot safely run more than 1 replica.
  # For HA see SQL Server Always On Availability Groups.
  replicas: 1
  selector:
    matchLabels:
      {{- include "sql-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sql-server.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: sql-server
          # azure-sql-edge is the ARM64-compatible image for Apple Silicon.
          # AWS DIFFERENCE: switch to mcr.microsoft.com/mssql/server:2022-latest
          # on x86_64 EKS nodes (or keep azure-sql-edge for Graviton ARM64 nodes).
          image: {{ .Values.sqlServer.image }}
          imagePullPolicy: {{ .Values.sqlServer.imagePullPolicy }}
          ports:
            - containerPort: 1433
          env:
            - name: SA_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sql-server-secret
                  key: sa-password
            - name: ACCEPT_EULA
              value: "Y"
            - name: MSSQL_PID
              value: Developer
          resources:
            {{- toYaml .Values.sqlServer.resources | nindent 12 }}
          # TCP probe — SQL Server needs ~30 s to initialise after pod starts.
          livenessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 6
          readinessProbe:
            tcpSocket:
              port: 1433
            initialDelaySeconds: 30
            periodSeconds: 10
          volumeMounts:
            - name: sqlserver-data
              mountPath: /var/opt/mssql
      volumes:
        - name: sqlserver-data
          persistentVolumeClaim:
            claimName: sqlserver-data
