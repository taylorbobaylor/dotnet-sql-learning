apiVersion: v1
kind: Secret
metadata:
  name: sql-server-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sql-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Terraform passes the value from var.sa_password (sensitive) via a `set` block.
  # AWS DIFFERENCE: for production use the External Secrets Operator to pull the
  # password from AWS Secrets Manager instead of embedding it here.
  sa-password: {{ .Values.sqlServer.saPassword | quote }}
