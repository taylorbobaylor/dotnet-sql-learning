apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: sqlserver-data
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sql-server.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: {{ .Values.storage.size }}
  # Docker Desktop: omit storageClassName to use the default local provisioner.
  {{- if .Values.storage.storageClassName }}
  # AWS DIFFERENCE: gp3 is set when storage.storageClassName is provided.
  storageClassName: {{ .Values.storage.storageClassName }}
  {{- end }}
