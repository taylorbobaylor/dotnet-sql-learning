# Default values for sql-server.
# Terraform overrides these via `set` blocks in the helm_release resource.

sqlServer:
  # ARM64-compatible image for Apple Silicon / Docker Desktop.
  # AWS DIFFERENCE: switch to mcr.microsoft.com/mssql/server:2022-latest on x86_64 EKS nodes.
  image: mcr.microsoft.com/azure-sql-edge:latest
  imagePullPolicy: IfNotPresent

  # SA password — REQUIRED. Never commit a real value here.
  # Terraform injects this from var.sa_password (sensitive).
  saPassword: ""

  # NodePort to bind on Docker Desktop (localhost:<nodePort>).
  # AWS DIFFERENCE: set serviceType to LoadBalancer and remove nodePort.
  serviceType: NodePort
  nodePort: 31433

  resources:
    requests:
      memory: "1Gi"
      cpu: "500m"
    limits:
      memory: "2Gi"
      cpu: "1000m"
    # AWS DIFFERENCE: right-size for your EKS node instance type.
    # r-series (memory-optimised) instances are recommended for production.

storage:
  size: 5Gi
  # AWS DIFFERENCE: uncomment for EBS-backed storage on EKS.
  # Requires the EBS CSI driver add-on:
  #   aws eks create-addon --cluster-name <name> --addon-name aws-ebs-csi-driver
  # storageClassName: gp3
