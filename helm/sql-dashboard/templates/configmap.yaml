apiVersion: v1
kind: ConfigMap
metadata:
  name: sql-dashboard-nginx
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sql-dashboard.labels" . | nindent 4 }}
data:
  default.conf: |
    server {
        listen 80;
        listen [::]:80;
        root /usr/share/nginx/html;
        index index.html;

        # Proxy API routes to the in-cluster benchmark API service.
        # The dashboard's Angular build uses empty apiBaseUrl (relative URLs),
        # so nginx forwards them to the API pod via in-cluster DNS.
        location /health {
            proxy_pass http://{{ .Values.apiServiceHost }}/health;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /scenarios {
            proxy_pass http://{{ .Values.apiServiceHost }}/scenarios;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # SPA fallback — serve index.html for all other routes.
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
