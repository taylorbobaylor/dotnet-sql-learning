apiVersion: apps/v1
kind: Deployment
metadata:
  name: sql-dashboard
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sql-dashboard.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "sql-dashboard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "sql-dashboard.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: sql-dashboard
          # Build locally: docker build -t sql-dashboard sql-dashboard/
          # AWS DIFFERENCE: push to ECR and update image.repository + pullPolicy: Always.
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP

          # Mount the nginx config from the ConfigMap.
          # The ConfigMap proxies /health and /scenarios to the API service.
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf

          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            {{- toYaml .Values.resources | nindent 12 }}

      volumes:
        - name: nginx-config
          configMap:
            name: sql-dashboard-nginx
