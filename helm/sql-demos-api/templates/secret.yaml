apiVersion: v1
kind: Secret
metadata:
  name: sql-demos-api-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "sql-demos-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Full ADO.NET connection string stored as a secret so the SA password
  # is never visible in the pod spec or ConfigMap.
  # Terraform injects the password via a `set` block before this is rendered.
  #
  # AWS DIFFERENCE: swap for External Secrets Operator + AWS Secrets Manager
  # so plaintext never touches Terraform state.
  connection-string: {{ .Values.connectionString | quote }}
