services:
  sqlserver:
    # SQL Server container images don't natively support macOS ARM64, so use
    # the Azure SQL Edge image which is compatible with arm64 and provides a
    # very similar SQL Server experience for development/testing.
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: sql-interview-demo
    # Run as root so the container can create /.system and write to
    # /var/opt/mssql on macOS Docker, where named volumes are owned by root
    # and the default mssql user can't write to them.  Fine for local dev.
    user: "0:0"
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set — copy docker/.env.example to docker/.env and fill it in}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - ./init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      # Use a TCP port check — avoids depending on sqlcmd binary location,
      # which varies across azure-sql-edge versions.  Port 1433 open = engine up.
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1433' 2>/dev/null && echo ok"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  sql-init:
    image: mcr.microsoft.com/azure-sql-edge:latest
    user: "0:0"
    environment:
      SA_PASSWORD: "${SA_PASSWORD:?SA_PASSWORD must be set — copy docker/.env.example to docker/.env and fill it in}"
    volumes:
      - ./init:/init:ro
      - ./init-container.sh:/init-container.sh:ro
    depends_on:
      sqlserver:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/init-container.sh"]
    restart: "no"

  # Optional: SQL Server management tools via Adminer-style web UI
  # Uncomment if you want a browser-based query tool
  # adminer:
  #   image: dbeaver/cloudbeaver:latest
  #   container_name: dbeaver-demo
  #   ports:
  #     - "8978:8978"
  #   depends_on:
  #     sqlserver:
  #       condition: service_healthy

volumes:
  sqlserver_data:
    name: sql-interview-demo-data
